<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ανάκτηση Κωδικού - Olea AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-header text-center text-white rounded-top-4" style="background-color: #4A7C59; padding: 20px;">
                        <h3>Olea AI</h3>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <h4 class="text-center mb-4" style="color: #4A7C59;">Ανάκτηση Κωδικού</h4>
                        <p class="text-muted text-center mb-4">Εισάγετε το email σας και θα σας στείλουμε οδηγίες επαναφοράς.</p>

                        {% with messages = get_flashed_messages(with_categories=true) %}
                          {% if messages %}
                            {% for category, message in messages %}
                              <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                              </div>
                            {% endfor %}
                          {% endif %}
                        {% endwith %}

                        <form method="POST" action="/xexasa_kodiko">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control form-control-lg bg-light" id="email" name="email" required>
                            </div>
                            <button type="submit" class="btn btn-lg w-100 text-white mt-4" style="background-color: #4A7C59;">Αποστολή</button>
                        </form>
                        
                        <div class="mt-4 text-center">
                            <a href="/eisodos" style="color: #6c757d;"><i class="fas fa-arrow-left"></i> Επιστροφή στην είσοδο</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

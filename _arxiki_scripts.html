<script>
    // Επαναφορά Modal αν είχε παραμείνει ανοιχτό πριν την ανανέωση
    document.addEventListener('DOMContentLoaded', function() {
        const reopenModalId = sessionStorage.getItem('reopenModal');
        if (reopenModalId) {
            setTimeout(() => {
                const modalEl = document.getElementById(reopenModalId);
                if (modalEl) {
                    const myModal = new bootstrap.Modal(modalEl);
                    myModal.show();
                }
            }, 150); // Καθυστέρηση 150ms για να προλάβει να φορτώσει το γραφικό περιβάλλον
            sessionStorage.removeItem('reopenModal');
        }
    });

    // AJAX Weather Loading
    document.addEventListener('DOMContentLoaded', function() {
        const weatherContainers = document.querySelectorAll('.weather-async-top');
        weatherContainers.forEach(container => {
            const ktimaId = container.getAttribute('data-ktima-id');
            const isGeoponos = container.getAttribute('data-is-geoponos');
            
            fetch(`/api/ktima_weather_widget/${ktimaId}?is_geoponos_view=${isGeoponos}`)
                .then(res => res.json())
                .then(data => {
                    if (data.error) { container.innerHTML = '<div class="alert alert-warning py-1 small">Αδυναμία φόρτωσης δεδομένων.</div>'; return; }
                    container.innerHTML = data.top_html;
                    const bottomContainer = document.getElementById(`weather-bottom-${ktimaId}`);
                    if (bottomContainer) { bottomContainer.innerHTML = data.bottom_html; }
                })
                .catch(err => {
                    container.innerHTML = '<div class="alert alert-warning py-1 small text-center">Σφάλμα επικοινωνίας καιρού.</div>';
                });
        });
    });

    document.addEventListener('DOMContentLoaded', function() {
        {% for ktima in ktimata %}
            const chartModal_{{ ktima.id }} = document.getElementById('modalOikonomika{{ ktima.id }}');
            if (chartModal_{{ ktima.id }}) {
                chartModal_{{ ktima.id }}.addEventListener('shown.bs.modal', () => {
                    const ctx_{{ ktima.id }} = document.getElementById('chart{{ ktima.id }}');
                    if (ctx_{{ ktima.id }} && !Chart.getChart(ctx_{{ ktima.id }})) {
                        const labels_{{ ktima.id }} = [];
                        const data_{{ ktima.id }} = [];
                        {% for exodo in ktima.exoda %}
                            {% if not exodo.archived %}
                                labels_{{ ktima.id }}.push("{{ exodo.perigrafi|e|replace('"', '\\"')|replace("'", "\\'") }}");
                                data_{{ ktima.id }}.push({{ exodo.poso }});
                            {% endif %}
                        {% endfor %}
                        new Chart(ctx_{{ ktima.id }}, {
                            type: 'bar',
                            data: {
                                labels: labels_{{ ktima.id }},
                                datasets: [{ label: 'Κόστος (€)', data: data_{{ ktima.id }}, backgroundColor: 'rgba(231, 76, 60, 0.5)', borderColor: 'rgba(192, 57, 43, 1)', borderWidth: 1 }]
                            },
                            options: { scales: { y: { beginAtZero: true } }, responsive: true, maintainAspectRatio: false }
                        });
                    }
                });
            }
        {% endfor %}

        // --- Add Ktima Modal Map & Form Logic ---
        let addKtimaMap; 
        const addKtimaModal = document.getElementById('addKtimaModal');
        if(addKtimaModal) {
            addKtimaModal.addEventListener('shown.bs.modal', function () {
                if (!addKtimaMap) { 
                    addKtimaMap = L.map('map', { rotate: true, touchRotate: true }).setView([39.0742, 21.8243], 6);
                    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri', maxZoom: 19 }).addTo(addKtimaMap);
                    const drawnItemsAdd = new L.FeatureGroup();
                    addKtimaMap.addLayer(drawnItemsAdd);
                    const drawControlAdd = new L.Control.Draw({ draw: { polygon: { allowIntersection: false, showArea: true }, rectangle: { showArea: true }, polyline: false, circle: false, marker: false, circlemarker: false }, edit: { featureGroup: drawnItemsAdd, remove: true } });
                    addKtimaMap.addControl(drawControlAdd);
                    addKtimaMap.on(L.Draw.Event.CREATED, function (e) {
                        const layer = e.layer; drawnItemsAdd.clearLayers(); drawnItemsAdd.addLayer(layer);
                        document.getElementById('polygon_geojson').value = JSON.stringify(layer.toGeoJSON());
                        const center = layer.getBounds().getCenter();
                        document.getElementById('geografiko_platos').value = center.lat.toFixed(6);
                        document.getElementById('geografiko_mikos').value = center.lng.toFixed(6);
                        const latlngs = layer.getLatLngs()[0];
                        const areaSqMeters = L.GeometryUtil.geodesicArea(latlngs);
                        document.querySelector('input[name="stremmata"]').value = (areaSqMeters / 1000).toFixed(2);
                    });
                    addKtimaMap.on(L.Draw.Event.DELETED, function(e) {
                        if (drawnItemsAdd.getLayers().length === 0) {
                            document.getElementById('polygon_geojson').value = ""; document.getElementById('geografiko_platos').value = ""; document.getElementById('geografiko_mikos').value = ""; document.querySelector('input[name="stremmata"]').value = "";
                        }
                    });
                }
                setTimeout(() => { if (addKtimaMap) addKtimaMap.invalidateSize() }, 10);
            });
        }

        const addKtimaForm = document.querySelector('#addKtimaModal form');
        if (addKtimaForm) {
            addKtimaForm.addEventListener('submit', function(e) {
                const submitButton = addKtimaForm.querySelector('button[type="submit"]');
                if (submitButton && !submitButton.disabled) { submitButton.disabled = true; submitButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Αποθήκευση...'; } 
                else { e.preventDefault(); }
            });
        }

        // --- NDVI Map Initialization Logic ---
        window.initializedMaps = window.initializedMaps || {};
        window.ndviMapBounds = window.ndviMapBounds || {};
        window.ndviMapOverlays = window.ndviMapOverlays || {};

        window.initAdvancedNdviMap = function(lat, lng, mapId, ktimaId, savedGeoJsonStr) {
            if (!window.initializedMaps[mapId]) {
                const map = L.map(mapId, { rotate: true, touchRotate: true }).setView([lat, lng], 17);
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri' }).addTo(map);

                const drawnItems = new L.FeatureGroup(); map.addLayer(drawnItems);
                const drawControl = new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: true, polyline: false, rectangle: false, circle: false, marker: false, circlemarker: false } });
                map.addControl(drawControl);

                let currentGeoJSON = null; let currentBounds = null;
                const analyzeBtn = document.getElementById('btnAnalyze' + mapId);
                const loadingDiv = document.getElementById('ndviLoading' + mapId);
                const errorDiv = document.getElementById('ndviError' + mapId);
                const layerControls = document.getElementById('layerControls' + mapId);
                const resultDiv = document.getElementById('ndviResult' + mapId);
                const chatContainer = document.getElementById('ndviChatContainer' + mapId);
                const chatInput = document.getElementById('ndviUserInput' + mapId);
                const chatBtn = document.getElementById('btnNdviChat' + mapId);
                const chatLoading = document.getElementById('ndviChatLoading' + mapId);
                const refinedResultDiv = document.getElementById('ndviRefinedResult' + mapId);
                
                let redrawBtn = document.getElementById('btnRedraw' + mapId);
                if (!redrawBtn && analyzeBtn) {
                    redrawBtn = document.createElement('button'); redrawBtn.id = 'btnRedraw' + mapId; redrawBtn.type = 'button'; redrawBtn.className = 'btn btn-outline-danger ms-2 shadow-sm'; redrawBtn.innerHTML = '<i class="fas fa-trash-alt"></i> Επανασχεδιασμός';
                    analyzeBtn.insertAdjacentElement('afterend', redrawBtn);
                    redrawBtn.addEventListener('click', function() {
                        if (confirm('Θέλετε να διαγράψετε τον τρέχοντα χάρτη και να σχεδιάσετε νέο πολύγωνο;')) {
                            drawnItems.clearLayers(); currentGeoJSON = null; currentBounds = null;
                            analyzeBtn.classList.add('d-none'); redrawBtn.classList.add('d-none');
                            if (layerControls) layerControls.classList.add('d-none'); if (errorDiv) errorDiv.classList.add('d-none');
                            if (window.ndviMapOverlays && window.ndviMapOverlays[mapId]) { map.removeLayer(window.ndviMapOverlays[mapId]); }
                            new L.Draw.Polygon(map, drawControl.options.draw.polygon).enable();
                        }
                    });
                }

                if (savedGeoJsonStr && savedGeoJsonStr !== "None" && savedGeoJsonStr !== "") {
                    try {
                        const parsedGeo = JSON.parse(savedGeoJsonStr); currentGeoJSON = parsedGeo;
                        const geoLayer = L.geoJSON(parsedGeo); geoLayer.eachLayer(function(layer) { drawnItems.addLayer(layer); });
                        currentBounds = drawnItems.getBounds(); window.ndviMapBounds[mapId] = currentBounds;
                        if (currentBounds && currentBounds.isValid()) { map.fitBounds(currentBounds); if (analyzeBtn) analyzeBtn.classList.remove('d-none'); if (redrawBtn) redrawBtn.classList.remove('d-none'); }
                    } catch (e) { console.log("Σφάλμα φόρτωσης GeoJSON:", e); }
                } else { if (redrawBtn) redrawBtn.classList.add('d-none'); }

                map.on(L.Draw.Event.CREATED, function (event) {
                    drawnItems.clearLayers(); const layer = event.layer; drawnItems.addLayer(layer);
                    currentGeoJSON = layer.toGeoJSON(); currentBounds = layer.getBounds(); window.ndviMapBounds[mapId] = currentBounds;
                    if (analyzeBtn) analyzeBtn.classList.remove('d-none'); if (redrawBtn) redrawBtn.classList.remove('d-none'); if (errorDiv) errorDiv.classList.add('d-none');
                });

                if (analyzeBtn) {
                    analyzeBtn.addEventListener('click', function() {
                        if (!currentGeoJSON) return;
                        analyzeBtn.classList.add('d-none'); if (redrawBtn) redrawBtn.classList.add('d-none'); if (loadingDiv) loadingDiv.classList.remove('d-none'); if (errorDiv) errorDiv.classList.add('d-none'); if (layerControls) layerControls.classList.add('d-none');
                        if(window.ndviMapOverlays[mapId]) map.removeLayer(window.ndviMapOverlays[mapId]);
                        fetch('/ndvi_analyze/' + ktimaId, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ geo_json: currentGeoJSON }) })
                        .then(response => response.json()).then(data => {
                            if (loadingDiv) loadingDiv.classList.add('d-none');
                            analyzeBtn.classList.remove('d-none'); if (redrawBtn) redrawBtn.classList.remove('d-none');
                            if(data.error) {
                                if (errorDiv) { errorDiv.innerHTML = '<div class="alert alert-danger py-2 mb-0"><i class="fas fa-exclamation-triangle"></i> ' + data.error + '</div>'; errorDiv.className = 'mt-2'; }
                                alert(data.error); if(resultDiv) resultDiv.classList.add('d-none');
                            } else if(data.ndvi_url) {
                                window.setupSatelliteLayers(map, currentBounds, data, mapId); map.fitBounds(currentBounds);
                                if (layerControls) layerControls.classList.remove('d-none'); if (errorDiv) errorDiv.classList.add('d-none');
                                const dateDiv = document.getElementById('ndviDate' + mapId);
                                if (dateDiv && data.image_date) { dateDiv.innerHTML = '<i class="fas fa-satellite"></i> Ημερομηνία Λήψης: ' + data.image_date; dateDiv.classList.remove('d-none'); }
                                if(data.ai_message && resultDiv) {
                                    const aiTextSpan = resultDiv.querySelector('.ai-text');
                                    if (aiTextSpan) aiTextSpan.innerText = data.ai_message; resultDiv.classList.remove('d-none');
                                    if(chatContainer && chatBtn && chatInput && chatLoading && refinedResultDiv) {
                                        chatContainer.classList.remove('d-none');
                                        const newChatBtn = chatBtn.cloneNode(true); chatBtn.parentNode.replaceChild(newChatBtn, chatBtn);
                                        newChatBtn.addEventListener('click', function() {
                                            const userText = chatInput.value.trim(); if(!userText) return;
                                            newChatBtn.disabled = true; chatLoading.classList.remove('d-none'); refinedResultDiv.classList.add('d-none');
                                            fetch('/ndvi_chat/' + ktimaId, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_reply: userText, previous_ai_message: data.ai_message }) })
                                            .then(res => res.json()).then(chatData => {
                                                chatLoading.classList.add('d-none'); newChatBtn.disabled = false;
                                                if(chatData.error) { alert("Σφάλμα: " + chatData.error); } 
                                                else if(chatData.refined_message) { refinedResultDiv.innerHTML = '<strong><i class="fas fa-robot"></i> Τελική Συμβουλή:</strong> <br>' + chatData.refined_message; refinedResultDiv.classList.remove('d-none'); chatInput.value = ''; }
                                            }).catch(err => { chatLoading.classList.add('d-none'); newChatBtn.disabled = false; alert("Σφάλμα επικοινωνίας."); });
                                        });
                                    }
                                }
                            } else {
                                if (errorDiv) { errorDiv.innerHTML = '<div class="alert alert-warning py-2 mb-0"><i class="fas fa-info-circle"></i> ' + (data.message || 'Αποθηκεύτηκε, αλλά δεν βρέθηκε καθαρή δορυφορική λήψη.') + '</div>'; errorDiv.className = 'mt-2'; }
                                alert(data.message || 'Το πολύγωνο αποθηκεύτηκε, αλλά δεν βρέθηκαν πρόσφατες εικόνες χωρίς σύννεφα.');
                            }
                        });
                    });
                }
                window.initializedMaps[mapId] = map;
            } else { window.initializedMaps[mapId].invalidateSize(); }
        };

        window.setupSatelliteLayers = function(map, bounds, data, mapId) {
            let layerControls = document.getElementById('layerControls' + mapId);
            if(window.ndviMapOverlays && window.ndviMapOverlays[mapId]) { map.removeLayer(window.ndviMapOverlays[mapId]); }
            if (!window.ndviMapOverlays) window.ndviMapOverlays = {};
            if (data.ndvi_url) { let overlay = L.imageOverlay(data.ndvi_url, bounds).addTo(map); window.ndviMapOverlays[mapId] = overlay; }
            if (layerControls) {
                layerControls.innerHTML = '';
                const createBtn = (text, url, colorClass) => { if (!url) return ''; return `<button type="button" class="btn btn-sm ${colorClass} me-1 mb-1 shadow-sm" onclick="changeMapLayer('${mapId}', '${url}')">${text}</button>`; };
                let buttonsHtml = '';
                buttonsHtml += createBtn('NDVI (Βλάστηση)', data.ndvi_url, 'btn-success'); buttonsHtml += createBtn('NDWI (Υγρασία)', data.ndwi_url, 'btn-info text-white'); buttonsHtml += createBtn('EVI (Βλάστηση+)', data.evi_url, 'btn-primary'); buttonsHtml += createBtn('Φυσικό Χρώμα', data.truecolor_url, 'btn-secondary'); buttonsHtml += createBtn('Ψευδές Χρώμα', data.falsecolor_url, 'btn-warning text-dark');
                buttonsHtml += `<button type="button" class="btn btn-sm btn-outline-dark mb-1 shadow-sm ms-1" data-bs-toggle="modal" data-bs-target="#modalMapLegend"><i class="fas fa-question-circle"></i> Τι σημαίνουν τα χρώματα;</button>`;
                layerControls.innerHTML = buttonsHtml; layerControls.classList.remove('d-none');
            }
        };

        window.changeMapLayer = function(mapId, url) {
            let map = window.initializedMaps[mapId]; let bounds = window.ndviMapBounds[mapId];
            if (map && bounds && url) { if(window.ndviMapOverlays && window.ndviMapOverlays[mapId]) { map.removeLayer(window.ndviMapOverlays[mapId]); } let overlay = L.imageOverlay(url, bounds).addTo(map); window.ndviMapOverlays[mapId] = overlay; }
        };

        const ndviModals = document.querySelectorAll('.ndvi-modal');
        ndviModals.forEach(modal => {
            modal.addEventListener('shown.bs.modal', function () {
                const lat = parseFloat(this.getAttribute('data-lat')); const lng = parseFloat(this.getAttribute('data-lng')); const mapId = this.getAttribute('data-mapid'); const ktimaId = this.getAttribute('data-ktima-id'); const savedGeoJsonStr = this.getAttribute('data-geojson');
                window.initAdvancedNdviMap(lat, lng, mapId, ktimaId, savedGeoJsonStr);
            });
        });

        document.querySelectorAll('.ndvi-inline-container').forEach(container => {
            const lat = parseFloat(container.getAttribute('data-lat')); const lng = parseFloat(container.getAttribute('data-lng')); const mapId = container.getAttribute('data-mapid'); const ktimaId = container.getAttribute('data-ktima-id'); const savedGeoJsonStr = container.getAttribute('data-geojson');
            window.initAdvancedNdviMap(lat, lng, mapId, ktimaId, savedGeoJsonStr);
        });
    });

    function filterTasks(ktimaId, proelevsi) {
        const tasks = document.querySelectorAll('.task-item-' + ktimaId);
        tasks.forEach(task => { if (proelevsi === 'Όλα') { task.style.display = 'block'; } else { if (task.getAttribute('data-proelevsi') === proelevsi) { task.style.display = 'block'; } else { task.style.display = 'none'; } } });
    }

    window.generateAISyntagh = function(ktimaId, btn) {
        const ktimaName = btn.getAttribute('data-ktima-name') || 'Άγνωστο Κτήμα'; const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Παραγωγή Συνταγής...'; btn.disabled = true;
        fetch('/paragogi_syntaghs/' + ktimaId, { method: 'POST' }).then(response => response.json()).then(data => {
            btn.innerHTML = originalText; btn.disabled = false;
            if (data.error) { alert('Σφάλμα: ' + data.error); } else if (data.success) {
                const containers = document.querySelectorAll('#syntagesContainer' + ktimaId); const now = new Date(); const dateString = now.toLocaleDateString('el-GR') + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
                const newCard = `<div class="card border-success mb-2 shadow-sm"><div class="card-header bg-success text-white py-1 small d-flex justify-content-between align-items-center"><span><i class="fas fa-robot"></i> Νέα Συνταγή</span><div><span class="me-2">${dateString}</span><button class="btn btn-sm btn-light py-0 px-1 shadow-sm" data-ktima="${ktimaName}" data-date="${dateString}" data-proelevsi="Νέα Συνταγή" onclick="printSyntagh(this)" title="Εκτύπωση"><i class="fas fa-print text-success"></i></button></div></div><div class="card-body p-2 syntagh-content" style="white-space: pre-wrap; font-size: 0.9em;">${data.syntagh}</div><div class="card-footer bg-light p-1 border-top-0" style="animation: pulse 1s 1;"><div class="input-group input-group-sm"><input type="text" class="form-control border-success" placeholder="Διευκρίνιση στο AI..." id="replyInput${data.syntagh_id}"><button class="btn btn-success" type="button" data-ktima-name="${ktimaName}" onclick="refineSyntagh('${ktimaId}', '${data.syntagh_id}', this)"><i class="fas fa-paper-plane"></i></button></div></div></div>`;
                containers.forEach(container => { container.innerHTML = newCard; }); if (window.highlightTimers) window.highlightTimers();
            }
        }).catch(err => { btn.innerHTML = originalText; btn.disabled = false; alert('Σφάλμα επικοινωνίας. Παρακαλώ προσπαθήστε ξανά.'); });
    };

    window.refineSyntagh = function(ktimaId, syntaghId, btn) {
        const ktimaName = btn.getAttribute('data-ktima-name') || 'Άγνωστο Κτήμα'; const inputEl = document.getElementById('replyInput' + syntaghId); const userReply = inputEl.value.trim(); if (!userReply) return;
        const card = btn.closest('.card'); const prevText = card.querySelector('.syntagh-content').innerText; const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true; inputEl.disabled = true;
        fetch('/refine_syntagh/' + ktimaId, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ previous_recipe: prevText, user_reply: userReply }) }).then(res => res.json()).then(data => {
            btn.innerHTML = originalHtml; btn.disabled = false; inputEl.disabled = false; inputEl.value = '';
            if (data.error) { alert('Σφάλμα: ' + data.error); } else if (data.success) {
                const containers = document.querySelectorAll('#syntagesContainer' + ktimaId); const now = new Date(); const dateString = now.toLocaleDateString('el-GR') + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
                const newCard = `<div class="card border-success mb-2 shadow-sm" style="animation: pulse 1s 1;"><div class="card-header bg-success text-white py-1 small d-flex justify-content-between align-items-center"><span><i class="fas fa-robot"></i> AI Γεωπόνος (Αναθεωρημένη)</span><div><span class="me-2">${dateString}</span><button class="btn btn-sm btn-light py-0 px-1 shadow-sm" data-ktima="${ktimaName}" data-date="${dateString}" data-proelevsi="AI Γεωπόνος (Αναθεωρημένη)" onclick="printSyntagh(this)" title="Εκτύπωση"><i class="fas fa-print text-success"></i></button></div></div><div class="card-body p-2 syntagh-content" style="white-space: pre-wrap; font-size: 0.9em;">${data.syntagh}</div><div class="card-footer bg-light p-1 border-top-0"><div class="input-group input-group-sm"><input type="text" class="form-control border-success" placeholder="Διευκρίνιση στο AI..." id="replyInput${data.syntagh_id}"><button class="btn btn-success" type="button" data-ktima-name="${ktimaName}" onclick="refineSyntagh('${ktimaId}', '${data.syntagh_id}', this)"><i class="fas fa-paper-plane"></i></button></div></div></div>`;
                containers.forEach(container => { container.innerHTML = newCard; }); if (window.highlightTimers) window.highlightTimers();
            }
        }).catch(err => { btn.innerHTML = originalHtml; btn.disabled = false; inputEl.disabled = false; alert('Σφάλμα επικοινωνίας. Παρακαλώ προσπαθήστε ξανά.'); });
    }

    window.runAnalysisNow = function(ktimaId, btn, mapId) {
        const originalHtml = btn.innerHTML; btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Ανάλυση...';
        const errorDiv = document.getElementById('ndviError' + mapId); const resultDiv = document.getElementById('ndviResult' + mapId);
        if (errorDiv) errorDiv.classList.add('d-none'); if (resultDiv) resultDiv.classList.add('d-none');
        fetch('/trexe_doriforo/' + ktimaId, { method: 'POST', headers: { 'Content-Type': 'application/json' } }).then(res => { return res.json().catch(() => { throw new Error(`Αποτυχία δικτύου: ${res.status}`); }); }).then(data => {
            btn.disabled = false; btn.innerHTML = originalHtml;
            try {
                if (data.success) {
                    if (resultDiv && data.analysis_text) {
                        const aiSpan = resultDiv.querySelector('.ai-text'); if (aiSpan) { aiSpan.innerText = data.analysis_text; } else { resultDiv.innerHTML = '<i class="fas fa-robot"></i> <strong>Ανάλυση AI:</strong> <span class="ai-text">' + data.analysis_text + '</span>'; }
                        resultDiv.classList.remove('d-none');
                        const chatContainer = document.getElementById('ndviChatContainer' + mapId); const chatBtn = document.getElementById('btnNdviChat' + mapId); const chatInput = document.getElementById('ndviUserInput' + mapId); const chatLoading = document.getElementById('ndviChatLoading' + mapId); const refinedResultDiv = document.getElementById('ndviRefinedResult' + mapId);
                        if (chatContainer && data.analysis_text.includes("ΕΡΩΤΗΣΗ:")) {
                            chatContainer.classList.remove('d-none'); const newChatBtn = chatBtn.cloneNode(true); chatBtn.parentNode.replaceChild(newChatBtn, chatBtn);
                            newChatBtn.addEventListener('click', function() {
                                const userText = chatInput.value.trim(); if(!userText) return; newChatBtn.disabled = true; chatLoading.classList.remove('d-none'); refinedResultDiv.classList.add('d-none');
                                fetch('/ndvi_chat/' + ktimaId, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_reply: userText, previous_ai_message: data.analysis_text }) }).then(res => res.json()).then(chatData => {
                                    chatLoading.classList.add('d-none'); newChatBtn.disabled = false;
                                    if(chatData.error) alert("Σφάλμα: " + chatData.error); else if(chatData.refined_message) { refinedResultDiv.innerHTML = '<strong><i class="fas fa-robot"></i> Τελική Συμβουλή:</strong> <br>' + chatData.refined_message; refinedResultDiv.classList.remove('d-none'); chatInput.value = ''; }
                                }).catch(err => { chatLoading.classList.add('d-none'); newChatBtn.disabled = false; });
                            });
                        }
                    }
                    if (errorDiv) { errorDiv.innerHTML = '<div class="alert alert-success py-2 mb-0"><i class="fas fa-check-circle"></i> ' + data.message + '</div>'; errorDiv.className = 'mt-2'; }
                    let map = window.initializedMaps ? window.initializedMaps[mapId] : null; let bounds = window.ndviMapBounds ? window.ndviMapBounds[mapId] : null;
                    if (!bounds && map) { const containerEl = document.querySelector(`[data-mapid="${mapId}"]`); const geoStr = containerEl ? containerEl.getAttribute('data-geojson') : null; if (geoStr && geoStr !== "None" && geoStr !== "") { try { bounds = L.geoJSON(JSON.parse(geoStr)).getBounds(); } catch(e) {} } }
                    if (data.ndvi_url && map && bounds) {
                        if (typeof window.setupSatelliteLayers === 'function') { window.setupSatelliteLayers(map, bounds, data, mapId); map.fitBounds(bounds); }
                        const dateDiv = document.getElementById('ndviDate' + mapId); if (dateDiv && data.image_date) { dateDiv.innerHTML = '<i class="fas fa-satellite"></i> Ημερομηνία Λήψης: ' + data.image_date; dateDiv.classList.remove('d-none'); }
                    } else { console.warn("Αδυναμία φόρτωσης χάρτη: Λείπουν τα όρια ή το URL."); }
                } else { if (errorDiv) { errorDiv.innerHTML = '<div class="alert alert-danger py-2 mb-0"><i class="fas fa-exclamation-triangle"></i> ' + data.message + '</div>'; errorDiv.className = 'mt-2'; } alert(data.message); }
            } catch(e) { console.error("Σφάλμα:", e); if (errorDiv) { errorDiv.innerHTML = '<div class="alert alert-warning py-2 mb-0">Η ανάλυση πέτυχε, αλλά υπήρξε πρόβλημα στον χάρτη.</div>'; errorDiv.className = 'mt-2'; } }
        }).catch(err => { btn.disabled = false; btn.innerHTML = originalHtml; if (errorDiv) { errorDiv.innerHTML = '<div class="alert alert-danger py-2 mb-0">Σφάλμα δικτύου.</div>'; errorDiv.className = 'mt-2'; } alert('Σφάλμα δικτύου.'); });
    }

    window.steileSyntaghGeoponou = function(ktimaId) {
        const textarea = document.getElementById('keimenoSyntaghsGeoponou' + ktimaId); const text = textarea.value.trim(); if (!text) { alert('Γράψτε τη συνταγή.'); return; }
        const btn = document.getElementById('btnGeoponosSyntagh' + ktimaId); const originalHtml = btn.innerHTML; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Το AI εξάγει...'; btn.disabled = true; textarea.disabled = true;
        fetch('/xeirokiniti_syntagh/' + ktimaId, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ keimeno: text }) }).then(res => res.json()).then(data => {
            if (data.error) { alert('Σφάλμα: ' + data.error); btn.innerHTML = originalHtml; btn.disabled = false; textarea.disabled = false; } 
            else if (data.success) { alert('Η συνταγή στάλθηκε επιτυχώς!'); location.reload(); }
        }).catch(err => { alert('Σφάλμα επικοινωνίας.'); btn.innerHTML = originalHtml; btn.disabled = false; textarea.disabled = false; });
    };

    window.sendAiReply = function(ktimaId) {
        const inputEl = document.getElementById('aiUserReply' + ktimaId); const replyText = inputEl.value.trim(); if (!replyText) return;
        const btn = document.getElementById('btnSendAiReply' + ktimaId); const historyDiv = document.getElementById('aiChatHistory' + ktimaId); const currentQuestionEl = document.getElementById('aiCurrentQuestion' + ktimaId); const currentQuestionText = currentQuestionEl ? currentQuestionEl.innerText : "";
        historyDiv.innerHTML += `<div class="p-2 mb-2 bg-primary text-white border rounded shadow-sm w-75 align-self-end text-end"><strong>Εγώ:</strong><br> ${replyText}</div>`; inputEl.value = '';
        const originalBtnHtml = btn.innerHTML; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true; inputEl.disabled = true;
        fetch('/apantisi_sto_ai_ajax/' + ktimaId, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_reply: replyText, current_question: currentQuestionText }) }).then(res => res.json()).then(data => {
            btn.innerHTML = originalBtnHtml; btn.disabled = false; inputEl.disabled = false;
            if (data.error) { alert('Σφάλμα: ' + data.error); } else {
                if (data.next_question && data.next_question !== "") {
                    if (currentQuestionEl) currentQuestionEl.id = ''; historyDiv.innerHTML += `<div class="p-2 mb-2 bg-light border border-danger rounded shadow-sm w-75 align-self-start"><strong><i class="fas fa-robot text-danger"></i> AI:</strong><br><span id="aiCurrentQuestion${ktimaId}">${data.next_question}</span></div>`; inputEl.focus();
                } else { document.getElementById('aiChatInputArea' + ktimaId).style.display = 'none'; historyDiv.innerHTML += `<div class="p-2 mt-2 bg-success text-white border rounded text-center shadow-sm align-self-center w-100"><i class="fas fa-check-circle fa-lg mb-1"></i><br> Ολοκληρώθηκε!</div>`; }
                historyDiv.scrollTop = historyDiv.scrollHeight;
            }
        }).catch(err => { btn.innerHTML = originalBtnHtml; btn.disabled = false; inputEl.disabled = false; alert('Σφάλμα επικοινωνίας.'); });
    }

    window.cancelAiQuestion = function(ktimaId) {
        if (!confirm('Είστε σίγουροι ότι θέλετε να διαγράψετε αυτή την ερώτηση;')) return;
        fetch('/akyrosi_erotisis_ai/' + ktimaId, { method: 'POST', headers: { 'Content-Type': 'application/json' } }).then(res => res.json()).then(data => { if (data.success) { location.reload(); } else { alert('Σφάλμα: ' + data.error); } }).catch(err => alert('Σφάλμα.'));
    };
</script>

<script>
    // Επαναφορά Modal αν είχε παραμείνει ανοιχτό πριν την ανανέωση
    document.addEventListener('DOMContentLoaded', function() {
        const reopenModalId = sessionStorage.getItem('reopenModal');
        if (reopenModalId) {
            setTimeout(() => {
                const modalEl = document.getElementById(reopenModalId);
                if (modalEl) {
                    let myModal = bootstrap.Modal.getInstance(modalEl);
                    if (!myModal) {
                        myModal = new bootstrap.Modal(modalEl);
                    }
                    myModal.show();
                    
                    // Check if we need to scroll to syntages
                    const scrollKtimaId = sessionStorage.getItem('scrollToSyntages');
                    if (scrollKtimaId) {
                        setTimeout(() => {
                            const syntagesHeader = document.querySelector('#collapseSyntagesFarmer' + scrollKtimaId);
                            if (syntagesHeader) {
                                // Ensure the collapse is open
                                if (!syntagesHeader.classList.contains('show')) {
                                    new bootstrap.Collapse(syntagesHeader, { toggle: true });
                                }
                                
                                // Scroll the modal body to this section
                                const modalBody = modalEl.querySelector('.modal-body');
                                const targetPos = syntagesHeader.previousElementSibling.offsetTop; // The <h6> element above it
                                if (modalBody) {
                                    modalBody.scrollTo({ top: targetPos - 10, behavior: 'smooth' });
                                }
                            }
                            sessionStorage.removeItem('scrollToSyntages');
                        }, 400); // Wait for modal animation
                    }
                }
            }, 150); // Καθυστέρηση 150ms για να προλάβει να φορτώσει το γραφικό περιβάλλον
            sessionStorage.removeItem('reopenModal');
        }
    });

    // AJAX Weather Loading
    document.addEventListener('DOMContentLoaded', function() {
        const weatherContainers = document.querySelectorAll('.weather-async-top');
        weatherContainers.forEach(container => {
            const ktimaId = container.getAttribute('data-ktima-id');
            const isGeoponos = container.getAttribute('data-is-geoponos');
            
            fetch(`/api/ktima_weather_widget/${ktimaId}?is_geoponos_view=${isGeoponos}`)
                .then(res => res.json())
                .then(data => {
                    if (data.error) { container.innerHTML = '<div class="alert alert-warning py-1 small">Αδυναμία φόρτωσης δεδομένων.</div>'; return; }
                    container.innerHTML = data.top_html;
                    const bottomContainer = document.getElementById(`weather-bottom-${ktimaId}`);
                    if (bottomContainer) { bottomContainer.innerHTML = data.bottom_html; }
                })
                .catch(err => {
                    container.innerHTML = '<div class="alert alert-warning py-1 small text-center">Σφάλμα επικοινωνίας καιρού.</div>';
                });
        });
    });

    document.addEventListener('DOMContentLoaded', function() {
        {% for ktima in ktimata %}
            const chartModal_{{ ktima.id }} = document.getElementById('modalOikonomika{{ ktima.id }}');
            if (chartModal_{{ ktima.id }}) {
                chartModal_{{ ktima.id }}.addEventListener('shown.bs.modal', () => {
                    const ctx_{{ ktima.id }} = document.getElementById('chart{{ ktima.id }}');
                    if (ctx_{{ ktima.id }} && !Chart.getChart(ctx_{{ ktima.id }})) {
                        const labels_{{ ktima.id }} = [];
                        const data_{{ ktima.id }} = [];
                        {% for exodo in ktima.exoda %}
                            {% if not exodo.archived %}
                                labels_{{ ktima.id }}.push("{{ exodo.perigrafi|e|replace('"', '\\"')|replace("'", "\\'") }}");
                                data_{{ ktima.id }}.push({{ exodo.poso }});
                            {% endif %}
                        {% endfor %}
                        new Chart(ctx_{{ ktima.id }}, {
                            type: 'bar',
                            data: {
                                labels: labels_{{ ktima.id }},
                                datasets: [{ label: 'Κόστος (€)', data: data_{{ ktima.id }}, backgroundColor: 'rgba(231, 76, 60, 0.5)', borderColor: 'rgba(192, 57, 43, 1)', borderWidth: 1 }]
                            },
                            options: { scales: { y: { beginAtZero: true } }, responsive: true, maintainAspectRatio: false }
                        });
                    }
                });
            }
        {% endfor %}
        
        // --- Κουμπί GPS / Τρέχουσας Τοποθεσίας ---
        window.addGpsControl = function(map) {
            const GpsControl = L.Control.extend({
                options: { position: 'topleft' },
                onAdd: function (map) {
                    const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');
                    container.style.backgroundColor = 'white';
                    container.style.width = '34px';
                    container.style.height = '34px';
                    container.style.cursor = 'pointer';
                    container.style.display = 'flex';
                    container.style.alignItems = 'center';
                    container.style.justifyContent = 'center';
                    container.title = 'Εύρεση τρέχουσας τοποθεσίας (GPS)';
                    container.innerHTML = '<i class="fas fa-crosshairs text-primary" style="font-size: 1.2em;"></i>';
                    
                    container.onclick = function(e){
                        e.preventDefault(); e.stopPropagation();
                        container.innerHTML = '<i class="fas fa-spinner fa-spin text-primary" style="font-size: 1.2em;"></i>';
                        map._gpsClicked = true;
                        map.locate({setView: true, maxZoom: 17, enableHighAccuracy: true});
                    }
                    return container;
                }
            });
            map.addControl(new GpsControl());
            map.on('locationfound', function(e) { const ctrl = map.getContainer().querySelector('.fa-spinner'); if (ctrl) { ctrl.className = 'fas fa-crosshairs text-primary'; } });
            map.on('locationerror', function(e) { 
                const ctrl = map.getContainer().querySelector('.fa-spinner'); 
                if (ctrl) { ctrl.className = 'fas fa-crosshairs text-primary'; } 
                if (map._gpsClicked) { alert("Δεν ήταν δυνατή η πρόσβαση στο GPS. Ελέγξτε αν έχετε δώσει άδεια τοποθεσίας στον browser σας."); map._gpsClicked = false; }
            });
        };

        // --- Κουμπί Πλήρους Οθόνης (Fullscreen) ---
        window.addFullscreenControl = function(map) {
            const FsControl = L.Control.extend({
                options: { position: 'topleft' },
                onAdd: function (map) {
                    const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');
                    container.style.backgroundColor = 'white';
                    container.style.width = '34px';
                    container.style.height = '34px';
                    container.style.cursor = 'pointer';
                    container.style.display = 'flex';
                    container.style.alignItems = 'center';
                    container.style.justifyContent = 'center';
                    container.title = 'Πλήρης Οθόνη';
                    container.innerHTML = '<i class="fas fa-expand text-primary" style="font-size: 1.2em;"></i>';
                    
                    container.onclick = function(e){
                        e.preventDefault(); e.stopPropagation();
                        const mapElem = map.getContainer();
                        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                            if (mapElem.requestFullscreen) { mapElem.requestFullscreen(); }
                            else if (mapElem.webkitRequestFullscreen) { mapElem.webkitRequestFullscreen(); }
                            else if (mapElem.msRequestFullscreen) { mapElem.msRequestFullscreen(); }
                        } else {
                            if (document.exitFullscreen) { document.exitFullscreen(); }
                            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
                            else if (document.msExitFullscreen) { document.msExitFullscreen(); }
                        }
                    }
                    
                    const updateIcon = () => {
                        if (document.fullscreenElement || document.webkitFullscreenElement) { container.innerHTML = '<i class="fas fa-compress text-primary" style="font-size: 1.2em;"></i>'; } 
                        else { container.innerHTML = '<i class="fas fa-expand text-primary" style="font-size: 1.2em;"></i>'; }
                        setTimeout(() => { map.invalidateSize(); }, 200);
                    };
                    document.addEventListener('fullscreenchange', updateIcon);
                    document.addEventListener('webkitfullscreenchange', updateIcon);
                    return container;
                }
            });
            map.addControl(new FsControl());
        };

        // --- Add Ktima Modal Map & Form Logic ---
        let addKtimaMap; 
        const addKtimaModal = document.getElementById('addKtimaModal');
        if(addKtimaModal) {
            addKtimaModal.addEventListener('shown.bs.modal', function () {
                if (!addKtimaMap) {
                    const defaultLat = this.dataset.defaultLat || 39.0742;
                    const defaultLng = this.dataset.defaultLng || 21.8243;
                    const defaultZoom = this.dataset.defaultLat ? 14 : 6; // Zoom in if we have a specific location

                    addKtimaMap = L.map('map', { rotate: true, touchRotate: true }).setView([defaultLat, defaultLng], defaultZoom);
                    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri', maxZoom: 19 }).addTo(addKtimaMap);
                    window.addKtimaMapInstance = addKtimaMap; // Εξαγωγή του χάρτη για την αναζήτηση
                    window.addGpsControl(addKtimaMap);
                    window.addFullscreenControl(addKtimaMap);
                    const drawnItemsAdd = new L.FeatureGroup();
                    addKtimaMap.addLayer(drawnItemsAdd);
                    const drawControlAdd = new L.Control.Draw({ draw: { polygon: { allowIntersection: false, showArea: true }, rectangle: { showArea: true }, polyline: false, circle: false, marker: false, circlemarker: false }, edit: { featureGroup: drawnItemsAdd, remove: true } });
                    addKtimaMap.addControl(drawControlAdd);
                    addKtimaMap.on(L.Draw.Event.CREATED, function (e) {
                        const layer = e.layer; drawnItemsAdd.clearLayers(); drawnItemsAdd.addLayer(layer);
                        
                        let geoJson = layer.toGeoJSON();
                        if (geoJson.geometry && geoJson.geometry.coordinates) {
                            geoJson.geometry.coordinates = geoJson.geometry.coordinates.map(ring => ring.map(coord => [Number(coord[0].toFixed(6)), Number(coord[1].toFixed(6))]));
                        }
                        document.getElementById('polygon_geojson').value = JSON.stringify(geoJson);
                        
                        const center = layer.getBounds().getCenter();
                        document.getElementById('geografiko_platos').value = center.lat.toFixed(6);
                        document.getElementById('geografiko_mikos').value = center.lng.toFixed(6);
                        const latlngs = layer.getLatLngs()[0];
                        const areaSqMeters = L.GeometryUtil.geodesicArea(latlngs);
                        const stremmata = (areaSqMeters / 1000).toFixed(2);
                        document.querySelector('input[name="stremmata"]').value = stremmata;
                        
                        if (areaSqMeters < 100) {
                            alert("⚠️ Προσοχή! Το κτήμα που σχεδιάσατε είναι πάρα πολύ μικρό (" + stremmata + " στρέμματα). Ο δορυφόρος απαιτεί μεγαλύτερη επιφάνεια (τουλάχιστον 0.1 στρ.) για να δώσει σωστά δεδομένα. Σας προτείνουμε να το επανασχεδιάσετε.");
                        } else if (areaSqMeters > 500000) {
                            alert("⚠️ Προσοχή! Το κτήμα που σχεδιάσατε φαίνεται υπερβολικά μεγάλο (" + stremmata + " στρέμματα). Εάν δεν πρόκειται για τόσο μεγάλη έκταση, ίσως έχετε κάνει λάθος στο ζουμ. Παρακαλώ ελέγξτε το.");
                        }
                    });
                    addKtimaMap.on(L.Draw.Event.DELETED, function(e) {
                        if (drawnItemsAdd.getLayers().length === 0) {
                            document.getElementById('polygon_geojson').value = ""; document.getElementById('geografiko_platos').value = ""; document.getElementById('geografiko_mikos').value = ""; document.querySelector('input[name="stremmata"]').value = "";
                        }
                    });
                }
                setTimeout(() => { if (addKtimaMap) addKtimaMap.invalidateSize() }, 10);
            });
        }

        const addKtimaForm = document.querySelector('#addKtimaModal form');
        if (addKtimaForm) {
            addKtimaForm.addEventListener('submit', function(e) {
                const submitButton = addKtimaForm.querySelector('button[type="submit"]');
                if (submitButton && !submitButton.disabled) { submitButton.disabled = true; submitButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Αποθήκευση...'; } 
                else { e.preventDefault(); }
            });
        }
        
        // --- Auto-Open Edit Location Modal after AI Ktima Creation ---
        const openEditMapId = sessionStorage.getItem('openEditLocationModal');
        if (openEditMapId) {
            sessionStorage.removeItem('openEditLocationModal');
            setTimeout(() => {
                const modalEl = document.getElementById('modalEditLocation' + openEditMapId);
                if (modalEl) { 
                    let editModal = bootstrap.Modal.getInstance(modalEl);
                    if (!editModal) {
                        editModal = new bootstrap.Modal(modalEl);
                    }
                    editModal.show(); 
                }
            }, 300);
        }

        // --- Edit Location Map Initialization ---
        const editLocationModals = document.querySelectorAll('.edit-location-modal');
        editLocationModals.forEach(modal => {
            modal.addEventListener('shown.bs.modal', function () {
                const lat = parseFloat(this.getAttribute('data-lat')) || 37.9838; 
                const lng = parseFloat(this.getAttribute('data-lng')) || 23.7275; 
                const mapId = this.getAttribute('data-mapid'); 
                const savedGeoJsonStr = this.getAttribute('data-geojson');
                const ktimaId = this.getAttribute('data-ktima-id');

                if (!window.initializedMaps[mapId]) {
                    const map = L.map(mapId, { rotate: true, touchRotate: true }).setView([lat, lng], 15);
                    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri', maxZoom: 19 }).addTo(map);
                    window.addGpsControl(map);
                    window.addFullscreenControl(map);
                    const drawnItems = new L.FeatureGroup(); map.addLayer(drawnItems);
                    const drawControl = new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: { allowIntersection: false, showArea: true }, rectangle: false, polyline: false, circle: false, marker: false, circlemarker: false } });
                    map.addControl(drawControl);

                    if (savedGeoJsonStr && savedGeoJsonStr !== "None" && savedGeoJsonStr !== "") {
                        try { const geoLayer = L.geoJSON(JSON.parse(savedGeoJsonStr)); geoLayer.eachLayer(function(layer) { drawnItems.addLayer(layer); }); map.fitBounds(drawnItems.getBounds()); } catch (e) {}
                    } else if (lat === 37.9838) {
                        // Προεπιλογή Αθήνας από AI: Ζήτα τοποθεσία χρήστη (GPS) αυτόματα
                        map.locate({setView: true, maxZoom: 17, enableHighAccuracy: true});
                    }

                    map.on(L.Draw.Event.CREATED, function (e) {
                        drawnItems.clearLayers(); const layer = e.layer; drawnItems.addLayer(layer);
                        
                        let geoJson = layer.toGeoJSON();
                        if (geoJson.geometry && geoJson.geometry.coordinates) {
                            geoJson.geometry.coordinates = geoJson.geometry.coordinates.map(ring => ring.map(coord => [Number(coord[0].toFixed(6)), Number(coord[1].toFixed(6))]));
                        }
                        document.getElementById('polyEdit' + ktimaId).value = JSON.stringify(geoJson);
                        
                        const center = layer.getBounds().getCenter();
                        document.getElementById('latEdit' + ktimaId).value = center.lat.toFixed(6);
                        document.getElementById('lngEdit' + ktimaId).value = center.lng.toFixed(6);
                        const areaSqMeters = L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]);
                        const stremmata = (areaSqMeters / 1000).toFixed(2);
                        document.getElementById('strEdit' + ktimaId).value = stremmata;
                        
                        if (areaSqMeters < 100) {
                            alert("⚠️ Προσοχή! Το κτήμα που σχεδιάσατε είναι πάρα πολύ μικρό (" + stremmata + " στρέμματα). Ο δορυφόρος απαιτεί μεγαλύτερη επιφάνεια για σωστά δεδομένα. Σας προτείνουμε να το επανασχεδιάσετε.");
                        } else if (areaSqMeters > 500000) {
                            alert("⚠️ Προσοχή! Το κτήμα που σχεδιάσατε φαίνεται υπερβολικά μεγάλο (" + stremmata + " στρέμματα). Παρακαλώ βεβαιωθείτε ότι δεν έχετε κάνει λάθος στο ζουμ.");
                        }
                    });

                    map.on(L.Draw.Event.DELETED, function(e) { if (drawnItems.getLayers().length === 0) { document.getElementById('polyEdit' + ktimaId).value = ""; } });
                    window.initializedMaps[mapId] = map;
                } else { window.initializedMaps[mapId].invalidateSize(); }
            });
        });

        // --- NDVI Map Initialization Logic ---
        window.initializedMaps = window.initializedMaps || {};
        window.ndviMapBounds = window.ndviMapBounds || {};
        window.ndviMapOverlays = window.ndviMapOverlays || {};

        window.initAdvancedNdviMap = function(lat, lng, mapId, ktimaId, savedGeoJsonStr) {
            if (!window.initializedMaps[mapId]) {
                const map = L.map(mapId, { rotate: true, touchRotate: true }).setView([lat, lng], 17);
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri' }).addTo(map);
                window.addFullscreenControl(map);

                const drawnItems = new L.FeatureGroup(); map.addLayer(drawnItems);
                const drawControl = new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: true, polyline: false, rectangle: false, circle: false, marker: false, circlemarker: false } });
                map.addControl(drawControl);

                let currentGeoJSON = null; let currentBounds = null;
                const analyzeBtn = document.getElementById('btnAnalyze' + mapId);
                const loadingDiv = document.getElementById('ndviLoading' + mapId);
                const errorDiv = document.getElementById('ndviError' + mapId);
                const layerControls = document.getElementById('layerControls' + mapId);
                const resultDiv = document.getElementById('ndviResult' + mapId);
                const chatContainer = document.getElementById('ndviChatContainer' + mapId);
                const chatInput = document.getElementById('ndviUserInput' + mapId);
                const chatBtn = document.getElementById('btnNdviChat' + mapId);
                const chatLoading = document.getElementById('ndviChatLoading' + mapId);
                const refinedResultDiv = document.getElementById('ndviRefinedResult' + mapId);
                
                let redrawBtn = document.getElementById('btnRedraw' + mapId);
                if (!redrawBtn && analyzeBtn) {
                    redrawBtn = document.createElement('button'); redrawBtn.id = 'btnRedraw' + mapId; redrawBtn.type = 'button'; redrawBtn.className = 'btn btn-outline-danger ms-2 shadow-sm'; redrawBtn.innerHTML = '<i class="fas fa-trash-alt"></i> Επανασχεδιασμός';
                    analyzeBtn.insertAdjacentElement('afterend', redrawBtn);
                    redrawBtn.addEventListener('click', function() {
                        if (confirm('Θέλετε να διαγράψετε τον τρέχοντα χάρτη και να σχεδιάσετε νέο πολύγωνο;')) {
                            drawnItems.clearLayers(); currentGeoJSON = null; currentBounds = null;
                            analyzeBtn.classList.add('d-none'); redrawBtn.classList.add('d-none');
                            if (layerControls) layerControls.classList.add('d-none'); if (errorDiv) errorDiv.classList.add('d-none');
                            if (window.ndviMapOverlays && window.ndviMapOverlays[mapId]) { map.removeLayer(window.ndviMapOverlays[mapId]); }
                            new L.Draw.Polygon(map, drawControl.options.draw.polygon).enable();
                        }
                    });
                }

                if (savedGeoJsonStr && savedGeoJsonStr !== "None" && savedGeoJsonStr !== "") {
                    try {
                        const parsedGeo = JSON.parse(savedGeoJsonStr); currentGeoJSON = parsedGeo;
                        const geoLayer = L.geoJSON(parsedGeo); geoLayer.eachLayer(function(layer) { drawnItems.addLayer(layer); });
                        currentBounds = drawnItems.getBounds(); window.ndviMapBounds[mapId] = currentBounds;
                        if (currentBounds && currentBounds.isValid()) { map.fitBounds(currentBounds); if (analyzeBtn) analyzeBtn.classList.remove('d-none'); if (redrawBtn) redrawBtn.classList.remove('d-none'); }
                    } catch (e) { console.log("Σφάλμα φόρτωσης GeoJSON:", e); }
                } else { if (redrawBtn) redrawBtn.classList.add('d-none'); }

                map.on(L.Draw.Event.CREATED, function (event) {
                    drawnItems.clearLayers(); const layer = event.layer; drawnItems.addLayer(layer);
                    
                    let geoJson = layer.toGeoJSON();
                    if (geoJson.geometry && geoJson.geometry.coordinates) {
                        geoJson.geometry.coordinates = geoJson.geometry.coordinates.map(ring => ring.map(coord => [Number(coord[0].toFixed(6)), Number(coord[1].toFixed(6))]));
                    }
                    currentGeoJSON = geoJson; currentBounds = layer.getBounds(); window.ndviMapBounds[mapId] = currentBounds;
                    
                    if (analyzeBtn) analyzeBtn.classList.remove('d-none'); if (redrawBtn) redrawBtn.classList.remove('d-none'); if (errorDiv) errorDiv.classList.add('d-none');
                    
                    const areaSqMeters = L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]);
                    const stremmata = (areaSqMeters / 1000).toFixed(2);
                    
                    if (areaSqMeters < 100) {
                        alert("⚠️ Προσοχή! Το κτήμα που σχεδιάσατε είναι πάρα πολύ μικρό (" + stremmata + " στρέμματα). Ο δορυφόρος απαιτεί μεγαλύτερη επιφάνεια (τουλάχιστον 0.1 στρ.) για να δώσει σωστά δεδομένα. Παρακαλώ πατήστε 'Επανασχεδιασμός'!");
                    } else if (areaSqMeters > 500000) {
                        alert("⚠️ Προσοχή! Το κτήμα που σχεδιάσατε φαίνεται υπερβολικά μεγάλο (" + stremmata + " στρέμματα). Εάν δεν πρόκειται για τόσο μεγάλη έκταση, ίσως έχετε κάνει λάθος. Παρακαλώ πατήστε 'Επανασχεδιασμός'.");
                    }
                });
                map.on(L.Draw.Event.DRAWSTART, function (e) { map.dragging.disable(); map.touchZoom.disable(); });
                map.on(L.Draw.Event.DRAWSTOP, function (e) { map.dragging.enable(); map.touchZoom.enable(); });

                if (analyzeBtn) {
                    analyzeBtn.addEventListener('click', function() {
                        if (!currentGeoJSON) return;
                        analyzeBtn.classList.add('d-none'); if (redrawBtn) redrawBtn.classList.add('d-none'); if (loadingDiv) loadingDiv.classList.remove('d-none'); if (errorDiv) errorDiv.classList.add('d-none'); if (layerControls) layerControls.classList.add('d-none');
                        if(window.ndviMapOverlays[mapId]) map.removeLayer(window.ndviMapOverlays[mapId]);
                        fetch('/ndvi_analyze/' + ktimaId, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ geo_json: currentGeoJSON }) })
                        .then(response => response.json()).then(data => {
                            if (loadingDiv) loadingDiv.classList.add('d-none');
                            analyzeBtn.classList.remove('d-none'); if (redrawBtn) redrawBtn.classList.remove('d-none');
                            if(data.error) {
                                if (errorDiv) { errorDiv.innerHTML = '<div class="alert alert-danger py-2 mb-0"><i class="fas fa-exclamation-triangle"></i> ' + data.error + '</div>'; errorDiv.className = 'mt-2'; }
                                alert(data.error); if(resultDiv) resultDiv.classList.add('d-none');
                            } else if(data.ndvi_url) {
                                window.setupSatelliteLayers(map, currentBounds, data, mapId); map.fitBounds(currentBounds);
                                if (layerControls) layerControls.classList.remove('d-none'); if (errorDiv) errorDiv.classList.add('d-none');
                                const dateDiv = document.getElementById('ndviDate' + mapId);
                                if (dateDiv && data.image_date) { dateDiv.innerHTML = '<i class="fas fa-satellite"></i> Ημερομηνία Λήψης: ' + data.image_date; dateDiv.classList.remove('d-none'); }
                                if(data.ai_message && resultDiv) {
                                    const aiTextSpan = resultDiv.querySelector('.ai-text');
                                    if (aiTextSpan) aiTextSpan.innerText = data.ai_message; resultDiv.classList.remove('d-none');
                                    if(chatContainer && chatBtn && chatInput && chatLoading && refinedResultDiv) {
                                        chatContainer.classList.remove('d-none');
                                        const newChatBtn = chatBtn.cloneNode(true); chatBtn.parentNode.replaceChild(newChatBtn, chatBtn);
                                        newChatBtn.addEventListener('click', function() {
                                            const userText = chatInput.value.trim(); if(!userText) return;
                                            newChatBtn.disabled = true; chatLoading.classList.remove('d-none'); refinedResultDiv.classList.add('d-none');
                                            fetch('/ndvi_chat/' + ktimaId, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_reply: userText, previous_ai_message: data.ai_message }) })
                                            .then(res => res.json()).then(chatData => {
                                                chatLoading.classList.add('d-none'); newChatBtn.disabled = false;
                                                if(chatData.error) { alert("Σφάλμα: " + chatData.error); } 
                                                else if(chatData.refined_message) { refinedResultDiv.innerHTML = '<strong><i class="fas fa-robot"></i> Τελική Συμβουλή:</strong> <br>' + chatData.refined_message; refinedResultDiv.classList.remove('d-none'); chatInput.value = ''; }

        files.forEach(file => { formData.append('fwtografia_analysis', file); });
        fetch('/analysi_egrafou/' + ktimaId, { method: 'POST', body: formData }).then(res => res.json()).then(data => {
            if (data.success) { sessionStorage.setItem('reopenModal', 'modalAnaluseis' + ktimaId); location.reload(); } else { alert(data.message || 'Σφάλμα επικοινωνίας.'); btn.disabled = false; loading.classList.add('d-none'); }
        }).catch(err => { alert('Σφάλμα διακομιστή.'); btn.disabled = false; loading.classList.add('d-none'); });
    };

    // --- Αναζήτηση Τοποθεσίας (Γεωκωδικοποίηση) στο Modal Νέου Κτήματος ---
    window.searchMapLocationAddKtima = function() {
        const query = document.getElementById('searchLocationInput').value.trim();
        if (!query) return;
        const btn = document.getElementById('btnSearchLocation');
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        btn.disabled = true;
        
        // Χρήση της έξυπνης μηχανής Photon (Komoot) με όρια αναζήτησης Ελλάδα/Κύπρο
        fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&bbox=19.0,34.0,30.0,42.0&limit=1`)
            .then(res => res.json())
            .then(data => {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
                if (data && data.features && data.features.length > 0) {
                    const lon = data.features[0].geometry.coordinates[0];
                    const lat = data.features[0].geometry.coordinates[1];
                    if (window.addKtimaMapInstance) { window.addKtimaMapInstance.setView([lat, lon], 14); }
                } else { alert('Δεν βρέθηκε η τοποθεσία. Δοκιμάστε να γράψετε τον νομό ή το κοντινότερο μεγάλο χωριό.'); }
            }).catch(err => { btn.innerHTML = originalHtml; btn.disabled = false; alert('Σφάλμα κατά την αναζήτηση.'); });
    };

    // --- Αναζήτηση Τοποθεσίας (Γεωκωδικοποίηση) στο Modal Επεξεργασίας ---
    window.searchMapLocationEditKtima = function(ktimaId) {
        const query = document.getElementById('searchLocationInputEdit' + ktimaId).value.trim();
        if (!query) return;
        const btn = document.getElementById('btnSearchLocationEdit' + ktimaId);
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        btn.disabled = true;
        
        fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&bbox=19.0,34.0,30.0,42.0&limit=1`)
            .then(res => res.json())
            .then(data => {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
                if (data && data.features && data.features.length > 0) {
                    const lon = data.features[0].geometry.coordinates[0];
                    const lat = data.features[0].geometry.coordinates[1];
                    const modal = document.getElementById('modalEditLocation' + ktimaId);
                    if (modal) {
                        const mapId = modal.getAttribute('data-mapid');
                        const map = window.initializedMaps[mapId];
                        if (map) { map.setView([lat, lon], 14); }
                    }
                } else { alert('Δεν βρέθηκε η τοποθεσία.'); }
            }).catch(err => { btn.innerHTML = originalHtml; btn.disabled = false; alert('Σφάλμα κατά την αναζήτηση.'); });
    };
</script>

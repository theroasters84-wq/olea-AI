<style>
    /* Fullscreen CSS για τον AI Γραμματέα */
    .fullscreen-bubble {
        width: 100vw !important;
        height: 100vh !important;
        min-width: 100vw !important;
        min-height: 100vh !important;
        max-width: 100vw !important;
        max-height: 100vh !important;
        top: 0 !important;
        left: 0 !important;
        bottom: auto !important;
        right: auto !important;
        border-radius: 0 !important;
        z-index: 1070 !important;
    }

    /* Responsive CSS για το παράθυρο του Γραμματέα */
    .secretary-bubble {
        position: fixed;
        bottom: 105px; /* Σε PC, στέκεται πάνω από τα κουμπιά */
        right: 30px;
        width: 360px;
        max-width: calc(100vw - 40px);
        height: 550px;
        max-height: calc(100vh - 130px);
        z-index: 1060;
        background-color: #ffffff;
        overflow: hidden;
        border-radius: 20px !important;
        box-shadow: 0 10px 40px rgba(0,0,0,0.15) !important;
        border: none !important;
        resize: both; /* Επιτρέπει αλλαγή μεγέθους μόνο σε PC */
    }

    /* Όταν η οθόνη είναι μικρή (Κινητά/Tablets) */
    @media (max-width: 768px) {
        .secretary-bubble {
            top: 10px !important; /* Καθηλώνουμε την κορυφή για να μην κρύβεται από το πληκτρολόγιο */
            bottom: auto !important;
            left: 10px !important;
            right: 10px !important;
            width: auto !important;
            max-width: none !important;
            height: calc(100dvh - 20px); /* Αφαιρέθηκε το !important για να το ελέγχει η JS δυναμικά */
            max-height: none !important;
            resize: none !important; /* Απενεργοποίηση αλλαγής μεγέθους */
        }
    }
</style>

<!-- AI ΓΡΑΜΜΑΤΕΑΣ (Floating Chat Bubble) -->
<div id="secretaryBubble" class="secretary-bubble d-none flex-column">
    <div class="text-white p-2 px-3 d-flex justify-content-between align-items-center shadow-sm" id="secretaryHeader" style="background: linear-gradient(135deg, #4A7C59, #619b72); z-index: 10;">
        <div class="d-flex align-items-center">
            <div class="bg-white rounded-circle d-flex align-items-center justify-content-center me-2" style="width: 32px; height: 32px;">
                <i class="fas fa-headset" style="color: #4A7C59;"></i>
            </div>
            <h6 class="mb-0 fw-bold" style="font-size: 1rem;">Γραμματέας</h6>
        </div>
        <div>
            <button type="button" class="btn btn-sm p-0 me-2" onclick="toggleFullscreenSecretaryBubble()" title="Πλήρης Οθόνη" style="border: none; background: transparent;"><i class="fas fa-expand text-white"></i></button>
            <button type="button" class="btn btn-sm p-0 me-2" onclick="toggleSecretaryBubble()" title="Κλείσιμο" style="border: none; background: transparent;"><i class="fas fa-minus text-white"></i></button>
        </div>
    </div>
    <div class="d-flex flex-column flex-grow-1 bg-white p-2" style="min-height: 0;">
        <!-- Επιλογή Κτήματος Context -->
        <div class="mb-2 pb-2 text-center border-bottom">
            <select id="secretaryKtimaSelect" class="form-select form-select-sm border-0 bg-light text-center shadow-none mx-auto" style="border-radius: 20px; width: 95%;">
                <option value="none" selected>Γενική Ερώτηση</option>
                {% for ktima in ktimata %}
                    <option value="{{ ktima.id }}">{{ ktima.onoma_ktimatos }}</option>
                {% endfor %}
                <option value="all">Όλα τα Κτήματα</option>
            </select>
        </div>
        
        <!-- Chat History -->
        <div id="secretaryChatHistory" class="flex-grow-1 p-2 bg-white mb-2" style="overflow-y: auto; min-height: 0; display: flex; flex-direction: column;">
            <div class="p-2 px-3 mb-2 text-dark w-85 align-self-start small" style="background-color: #e4e6eb; border-radius: 18px 18px 18px 4px;">
                Γεια σας! Μπορείτε να μου πείτε "Μόλις ράντισα χαλκό", να με ρωτήσετε για τον καιρό, ή να μου στείλετε φωτογραφία.
            </div>
        </div>
        
        <!-- Input Area -->
        <form id="secretaryForm" onsubmit="event.preventDefault(); sendToSecretary();" class="mt-auto pt-2 border-top">
            <div class="d-flex align-items-end gap-1">
                <!-- Hidden File Inputs -->
                <input type="file" id="secretaryCameraInput" accept="image/*" capture="environment" class="d-none" onchange="previewSecretaryImages(this)">
                <input type="file" id="secretaryFilesInput" accept="image/*,.pdf" multiple class="d-none" onchange="previewSecretaryImages(this)">
                
                <!-- Dropdown for Attachment -->
                <button type="button" class="btn p-2" data-bs-toggle="dropdown" aria-expanded="false" title="Επισύναψη" style="color: #4A7C59; border-radius: 50%;">
                    <i class="fas fa-plus-circle fa-lg"></i>
                </button>
                <ul class="dropdown-menu shadow-sm" style="border-radius: 12px; border: none;">
                    <li><a class="dropdown-item py-2" href="#" onclick="document.getElementById('secretaryCameraInput').click(); event.preventDefault();"><i class="fas fa-camera text-success me-2"></i> Κάμερα</a></li>
                    <li><a class="dropdown-item py-2" href="#" onclick="document.getElementById('secretaryFilesInput').click(); event.preventDefault();"><i class="fas fa-image text-primary me-2"></i> Φωτογραφίες / PDF</a></li>
                </ul>
                
                <!-- Clear -->
                <button type="button" class="btn text-secondary p-2" onclick="clearSecretaryHistory()" title="Καθαρισμός" style="border-radius: 50%;">
                    <i class="fas fa-broom"></i>
                </button>
                
                <!-- Text Input -->
                <textarea id="secretaryTextInput" class="form-control border-0" placeholder="Aa" rows="1" style="resize: none; overflow-y: auto; min-height: 38px; max-height: 120px; padding-top: 8px; line-height: 1.5; border-radius: 20px; background-color: #f0f2f5; margin-bottom: 2px;"></textarea>
                
                <!-- Voice Input (Mic) -->
                <button type="button" class="btn p-2" id="secretaryMicBtn" onclick="startSecretaryDictation()" title="Υπαγόρευση" style="color: #4A7C59; border-radius: 50%;">
                    <i class="fas fa-microphone fa-lg"></i>
                </button>
                
                <!-- Submit -->
                <button type="submit" class="btn p-2" id="secretarySubmitBtn" style="color: #4A7C59; border-radius: 50%;">
                    <i class="fas fa-paper-plane fa-lg"></i>
                </button>
            </div>
            <div id="secretaryImagePreview" class="mt-1 d-none text-muted small"></div>
        </form>
    </div>
</div>

<!-- Floating Action Button: AI Γραμματέας (Messenger Style) -->
<div id="secretaryFab" onclick="toggleSecretaryBubble()" title="AI Γραμματέας" class="shadow-lg"
     style="position: fixed; bottom: 105px; right: 30px; width: 60px; height: 60px; z-index: 1050; border-radius: 50%; background: linear-gradient(135deg, #4A7C59, #619b72); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s;">
    <i class="fas fa-headset fa-2x text-white"></i>
</div>

<!-- Κρυφό div για τη μεταφορά του ιστορικού από τη βάση δεδομένων με ασφάλεια -->
<div id="secretaryHistoryData" class="d-none">{{ current_user.secretary_history or '[]' }}</div>

<script>
    // --- AI ΓΡΑΜΜΑΤΕΑΣ: Λειτουργίες UI & Web Speech API ---
    window.toggleSecretaryBubble = function() {
        const bubble = document.getElementById('secretaryBubble');
        if (bubble.classList.contains('d-none')) {
            bubble.classList.remove('d-none');
            bubble.classList.add('d-flex');
            sessionStorage.setItem('secretaryBubbleOpen', 'true');
            if (window.innerWidth <= 768) { document.body.style.overflow = 'hidden'; } // Κλείδωμα φόντου
        } else {
            bubble.classList.add('d-none');
            bubble.classList.remove('d-flex');
            sessionStorage.setItem('secretaryBubbleOpen', 'false');
            document.body.style.overflow = ''; // Ξεκλείδωμα φόντου
        }
    };

    // --- Fullscreen Toggle ---
    window.toggleFullscreenSecretaryBubble = function() {
        const bubble = document.getElementById('secretaryBubble');
        const icon = document.querySelector('#secretaryHeader .fa-expand, #secretaryHeader .fa-compress');
        
        if (bubble.classList.contains('fullscreen-bubble')) {
            bubble.classList.remove('fullscreen-bubble');
            if (icon) {
                icon.classList.remove('fa-compress');
                icon.classList.add('fa-expand');
            }
        } else {
            bubble.classList.add('fullscreen-bubble');
            if (icon) {
                icon.classList.remove('fa-expand');
                icon.classList.add('fa-compress');
            }
        }
    };

    // --- Καθαρισμός Συνομιλίας ---
    window.clearSecretaryHistory = function() {
        if(confirm('Είστε σίγουροι ότι θέλετε να διαγράψετε το ιστορικό της τρέχουσας συζήτησης;')) {
            window.secretaryChatHistoryData = [];
            sessionStorage.removeItem('secretaryChatHistory');
            
            // Ενημέρωση του Server για μόνιμη διαγραφή
            fetch('/api/clear_secretary_history', { method: 'POST' });

            const historyDiv = document.getElementById('secretaryChatHistory');
            if (historyDiv) {
                historyDiv.innerHTML = `<div class="p-2 px-3 mb-2 text-dark w-85 align-self-start small" style="background-color: #e4e6eb; border-radius: 18px 18px 18px 4px;">
                    Γεια σας! Μπορείτε να μου πείτε "Μόλις ράντισα χαλκό", να με ρωτήσετε για τον καιρό, ή να μου στείλετε φωτογραφία.
                </div>`;
            }
        }
    };

    // Ασφαλής αποθήκευση ιστορικού
    function saveChatHistory() {
        sessionStorage.setItem('secretaryChatHistory', JSON.stringify(window.secretaryChatHistoryData));
    }

    // --- ΜΝΗΜΗ CHAT ΑΠΟ ΒΑΣΗ ΔΕΔΟΜΕΝΩΝ ---
    try {
        const rawData = document.getElementById('secretaryHistoryData').textContent;
        window.secretaryChatHistoryData = JSON.parse(rawData || '[]');
        sessionStorage.setItem('secretaryChatHistory', JSON.stringify(window.secretaryChatHistoryData));
    } catch(e) {
        window.secretaryChatHistoryData = JSON.parse(sessionStorage.getItem('secretaryChatHistory')) || [];
    }

    document.addEventListener('DOMContentLoaded', function() {
        // Επαναφορά του παραθύρου αν ήταν ανοιχτό πριν την ανανέωση της σελίδας
        if (sessionStorage.getItem('secretaryBubbleOpen') === 'true') {
            const bubble = document.getElementById('secretaryBubble');
            if (bubble) {
                bubble.classList.remove('d-none');
                bubble.classList.add('d-flex');
                if (window.innerWidth <= 768) { document.body.style.overflow = 'hidden'; }
            }
        }
        
        // Επαναφορά του επιλεγμένου κτήματος από τη μνήμη της συνεδρίας
        const ktimaSelect = document.getElementById('secretaryKtimaSelect');
        if (ktimaSelect) {
            const savedKtima = sessionStorage.getItem('secretarySelectedKtima');
            if (savedKtima) {
                ktimaSelect.value = savedKtima;
            }
            ktimaSelect.addEventListener('change', function() {
                sessionStorage.setItem('secretarySelectedKtima', this.value);
            });
        }

        const historyDiv = document.getElementById('secretaryChatHistory');
        if (historyDiv && window.secretaryChatHistoryData.length > 0) {
            window.secretaryChatHistoryData.forEach(msg => {


                if (msg.role === 'user') {
                    historyDiv.innerHTML += `<div class="p-2 px-3 mb-2 bg-primary text-white shadow-sm w-85 align-self-end ms-auto small" style="border-radius: 18px 18px 0px 18px;">${msg.content}</div>`;
                } else {
                    historyDiv.innerHTML += `<div class="p-2 px-3 mb-2 bg-light text-dark border-success border shadow-sm w-85 align-self-start small mt-2" style="border-radius: 18px 18px 18px 0px;"><strong><i class="fas fa-headset"></i> Γραμματέας:</strong><br>${msg.content}</div>`;
                }
            });
            setTimeout(() => { historyDiv.scrollTop = historyDiv.scrollHeight; }, 100);
        }

        const secInput = document.getElementById('secretaryTextInput');
        if (secInput) {
            // Αυτόματη προσαρμογή ύψους (Auto-resize)
            secInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                if (historyDiv) historyDiv.scrollTop = historyDiv.scrollHeight;
            });
            
            // Αποστολή με Enter (Shift+Enter για νέα γραμμή)
            secInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    // Στα κινητά αφήνουμε το Enter να αλλάζει γραμμή, στο PC στέλνει το μήνυμα
                    if (window.innerWidth > 768) {
                        e.preventDefault();
                        sendToSecretary();
                    }
                }
            });
        }

        // --- Υπολογισμός Ύψους σε Κινητά (Virtual Keyboard Fix) ---
        if (window.visualViewport) {
            const adjustSecretaryViewport = function() {
                const bubble = document.getElementById('secretaryBubble');
                if (bubble && !bubble.classList.contains('d-none') && window.innerWidth <= 768) {
                    // Το offsetTop ακολουθεί ακριβώς το ορατό κομμάτι χωρίς να σπάει το layout
                    bubble.style.setProperty('top', (window.visualViewport.offsetTop + 10) + 'px', 'important');
                    bubble.style.setProperty('height', (window.visualViewport.height - 20) + 'px', 'important');
                    
                    if (historyDiv) historyDiv.scrollTop = historyDiv.scrollHeight;
                } else if (bubble && window.innerWidth > 768 && !bubble.classList.contains('fullscreen-bubble')) {
                    bubble.style.height = '550px'; // Επαναφορά σε PC
                    bubble.style.top = '';
                }
            };
            
            window.visualViewport.addEventListener('resize', adjustSecretaryViewport);
            window.visualViewport.addEventListener('scroll', adjustSecretaryViewport); // Προσθήκη ελέγχου scroll
            
            if (secInput) {
                secInput.addEventListener('focus', () => { setTimeout(adjustSecretaryViewport, 50); setTimeout(adjustSecretaryViewport, 300); });
                secInput.addEventListener('blur', () => { setTimeout(adjustSecretaryViewport, 50); });
            }
        }
    });

    let secretaryMediaStream = null;
    let secretaryRecognition = null;
    let isSecretaryRecording = false;
    let secretarySelectedFiles = [];

    function previewSecretaryImages(input) { 
        if(input.files && input.files.length > 0) { 
            for(let i=0; i<input.files.length; i++) {
                secretarySelectedFiles.push(input.files[i]);
            }
            updateSecretaryImagePreview();
        } 
        input.value = ""; // Reset to allow same file selection again
    }
    
    function updateSecretaryImagePreview() {
        const previewDiv = document.getElementById('secretaryImagePreview');
        if (secretarySelectedFiles.length > 0) {
            previewDiv.innerHTML = `<i class="fas fa-file-alt"></i> Επιλέχθηκαν ${secretarySelectedFiles.length} αρχεία <i class="fas fa-times text-danger ms-2" style="cursor:pointer;" onclick="clearSecretaryImages()"></i>`;
            previewDiv.classList.remove('d-none');
        } else {
            previewDiv.classList.add('d-none');
        }
    }

    function clearSecretaryImages() { 
        secretarySelectedFiles = [];
        updateSecretaryImagePreview();
    }

    function startSecretaryDictation() {
        const micBtn = document.getElementById('secretaryMicBtn');
        const inputEl = document.getElementById('secretaryTextInput');
        
        if (isSecretaryRecording && secretaryRecognition) {
            secretaryRecognition.stop();
            return;
        }

        if (window.hasOwnProperty('webkitSpeechRecognition')) {
            secretaryRecognition = new webkitSpeechRecognition();
            secretaryRecognition.continuous = false; 
            secretaryRecognition.interimResults = false; 
            secretaryRecognition.lang = "el-GR";
            
            secretaryRecognition.onstart = function() {
                isSecretaryRecording = true;
                micBtn.style.color = '#dc3545';
                micBtn.innerHTML = '<i class="fas fa-stop-circle fa-beat fa-lg"></i>'; 
                inputEl.placeholder = "Ακούω...";
            };

            secretaryRecognition.onresult = function(e) { inputEl.value = e.results[0][0].transcript; sendToSecretary(); };
            secretaryRecognition.onerror = function(e) { inputEl.placeholder = "Σφάλμα μικροφώνου."; };
            secretaryRecognition.onend = function() { 
                isSecretaryRecording = false;
                micBtn.style.color = '#4A7C59'; 
                micBtn.innerHTML = '<i class="fas fa-microphone fa-lg"></i>'; inputEl.placeholder = "Aa"; 
            };
            
            secretaryRecognition.start();
        } else { alert("Ο browser σας δεν υποστηρίζει φωνητική αναγνώριση. Χρησιμοποιήστε Chrome ή Edge."); }
    }

    function sendToSecretary() {
        const inputEl = document.getElementById('secretaryTextInput');
        const ktimaId = document.getElementById('secretaryKtimaSelect').value;
        const historyDiv = document.getElementById('secretaryChatHistory');
        const submitBtn = document.getElementById('secretarySubmitBtn');
        
        const text = inputEl.value.trim();
        const hasImages = secretarySelectedFiles.length > 0;
        if(!text && !hasImages) return;
        
        const tempId = 'msg-' + Date.now();

        let historyText = text;
        if(hasImages) historyText = (text ? text + " " : "") + `[Επισυνάφθηκαν ${secretarySelectedFiles.length} αρχεία]`;
        if (historyText) {
            window.secretaryChatHistoryData.push({role: 'user', content: historyText});
            saveChatHistory();
        }
        let msgHtml = `<div id="${tempId}" class="p-2 px-3 mb-2 text-white w-85 align-self-end ms-auto small" style="background-color: #4A7C59; border-radius: 18px 18px 4px 18px;">`;
        if(hasImages) msgHtml += `<i class="fas fa-file-alt mb-1"></i> ${secretarySelectedFiles.length} Αρχεία<br>`;
        if(text) msgHtml += `${text}`;
        msgHtml += `</div>`;
        historyDiv.innerHTML += msgHtml; historyDiv.scrollTop = historyDiv.scrollHeight;
        
        const formData = new FormData();
        formData.append('text', text);
        formData.append('history', JSON.stringify(window.secretaryChatHistoryData));
        
        // Αποτροπή αποστολής της λέξης "none" που κρασάρει την PostgreSQL
        if(ktimaId && ktimaId !== 'none') {
            formData.append('ktima_id', ktimaId);
        }
        
        // Κρατάμε αντίγραφο των αρχείων σε περίπτωση αποτυχίας
        const filesToSend = [...secretarySelectedFiles];

        secretarySelectedFiles.forEach((file) => {
            formData.append('images', file);
        });
        
        inputEl.value = ""; clearSecretaryImages();
        inputEl.style.height = 'auto'; // Επαναφορά ύψους μετά την αποστολή
        submitBtn.disabled = true; submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin fa-lg"></i>';
        
        fetch('/api/ai_secretary', { method: 'POST', body: formData })
        .then(async res => {
            if (!res.ok) {
                let errStr = "Σφάλμα Διακομιστή";
                try {
                    const errData = await res.json();
                    errStr = errData.error || errStr;
                } catch(e) {
                    if(res.status === 413) errStr = "Το αρχείο εξακολουθεί να είναι πολύ μεγάλο.";
                    else errStr = `Σφάλμα ${res.status}: Αδυναμία επικοινωνίας με το AI.`;
                }
                throw new Error(errStr);
            }
            return res.json();
        })
        .then(data => {
            submitBtn.disabled = false; submitBtn.innerHTML = '<i class="fas fa-paper-plane fa-lg"></i>';
            if(data.error) { alert("Σφάλμα: " + data.error); return; }
            if(data.reply) {
                window.secretaryChatHistoryData.push({role: 'model', content: data.reply});
                saveChatHistory();
            }
            let bgClass = (data.action === 'ADD_TASK' || data.action === 'ADD_TASKS' || data.action === 'UPDATE_TASK' || data.action === 'ADD_HARVEST' || data.action === 'ADD_INVENTORY' || data.action === 'ADD_EXPENSE' || data.action === 'ADD_INCOME' || data.action === 'UPDATE_WATER' || data.action === 'ADD_KTIMA' || data.action === 'DELETE_KTIMA' || data.action === 'ARCHIVE_KTIMA') ? 'background-color: #d4edda; color: #155724;' : 'background-color: #e4e6eb; color: #050505;';
            let aiHtml = `<div class="p-2 px-3 mb-2 w-85 align-self-start small mt-1" style="${bgClass} border-radius: 18px 18px 18px 4px;">${data.reply}</div>`;
            historyDiv.innerHTML += aiHtml; historyDiv.scrollTop = historyDiv.scrollHeight;
            if (['ADD_TASK', 'ADD_TASKS', 'UPDATE_KTIMA', 'DELETE_TASKS', 'UPDATE_TASK', 'ADD_EXPENSE', 'ADD_INCOME', 'ADD_HARVEST', 'ADD_INVENTORY', 'UPDATE_WATER', 'DELETE_KTIMA', 'ARCHIVE_KTIMA'].includes(data.action)) {
                const toastEl = document.getElementById('actionToast');
                const toastBody = document.getElementById('toastBodyContent');
                if (toastEl && toastBody) {
                    toastBody.innerText = data.reply || 'Η ενέργεια ολοκληρώθηκε!';
                    const toast = bootstrap.Toast.getOrCreateInstance(toastEl);
                    toast.show();
                }
                setTimeout(() => {
                    sessionStorage.setItem('pageScrollPos', window.scrollY || document.documentElement.scrollTop);
                    location.reload();
                }, 1200);
            } else if (data.action === 'ADD_KTIMA') {
                if (data.new_ktima_id) {
                    // Αποθήκευση οδηγίας για άνοιγμα του χάρτη μετά την ανανέωση της σελίδας
                    sessionStorage.setItem('openEditLocationModal', data.new_ktima_id);
                    window.location.href = '/'; // Μετάβαση στην αρχική
                }
            }
        })
        .catch(err => {
            submitBtn.disabled = false; submitBtn.innerHTML = '<i class="fas fa-paper-plane fa-lg"></i>';
            
            // Επαναφορά του κειμένου και των αρχείων στο input
            inputEl.value = text;
            secretarySelectedFiles = filesToSend;
            updateSecretaryImagePreview();

            // Αφαίρεση του μηνύματος που απέτυχε από το UI
            const failedMsgDiv = document.getElementById(tempId);
            if (failedMsgDiv) failedMsgDiv.remove();

            // Αφαίρεση του μηνύματος από τη μνήμη του chat
            if (historyText) {
                window.secretaryChatHistoryData.pop();
                saveChatHistory();
            }
            alert("Αποτυχία αποστολής: " + (err.message || "Ελέγξτε τη σύνδεσή σας στο διαδίκτυο."));
        });
    }
</script>

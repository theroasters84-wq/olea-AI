<style>
    /* Fullscreen CSS για τον AI Γραμματέα */
    .fullscreen-bubble {
        width: 100vw !important;
        height: 100vh !important;
        min-width: 100vw !important;
        min-height: 100vh !important;
        max-width: 100vw !important;
        max-height: 100vh !important;
        top: 0 !important;
        left: 0 !important;
        bottom: auto !important;
        right: auto !important;
        border-radius: 0 !important;
        z-index: 1070 !important;
    }

    /* Responsive CSS για το παράθυρο του Γραμματέα */
    .secretary-bubble {
        position: fixed;
        bottom: 105px; /* Σε PC, στέκεται πάνω από τα κουμπιά */
        right: 30px;
        width: 360px;
        max-width: calc(100vw - 40px);
        height: 550px;
        max-height: calc(100vh - 130px);
        z-index: 1060;
        background-color: #f8f9fa;
        overflow: hidden;
        resize: both; /* Επιτρέπει αλλαγή μεγέθους μόνο σε PC */
    }

    /* Όταν η οθόνη είναι μικρή (Κινητά/Tablets) */
    @media (max-width: 768px) {
        .secretary-bubble {
            top: 10px !important; /* Καθηλώνουμε την κορυφή για να μην κρύβεται από το πληκτρολόγιο */
            bottom: auto !important;
            left: 10px !important;
            right: 10px !important;
            width: auto !important;
            max-width: none !important;
            height: calc(100dvh - 20px) !important; /* Το 100dvh προσαρμόζεται αυτόματα όταν ανοίγει το πληκτρολόγιο! */
            max-height: calc(100dvh - 20px) !important;
            resize: none !important; /* Απενεργοποίηση αλλαγής μεγέθους */
        }
    }
</style>

<!-- AI ΓΡΑΜΜΑΤΕΑΣ (Floating Chat Bubble) -->
<div id="secretaryBubble" class="secretary-bubble shadow-lg rounded-4 d-none flex-column border border-success">
    <div class="bg-success text-white p-2 px-3 d-flex justify-content-between align-items-center" id="secretaryHeader">
        <h6 class="mb-0 fw-bold"><i class="fas fa-headset me-2"></i> AI Γραμματέας</h6>
        <div>
            <button type="button" class="btn btn-sm btn-success p-0 me-2" onclick="toggleFullscreenSecretaryBubble()" title="Πλήρης Οθόνη" style="border: none;"><i class="fas fa-expand text-white"></i></button>
            <button type="button" class="btn btn-sm btn-success p-0 me-2" onclick="toggleSecretaryBubble()" title="Κλείσιμο" style="border: none;"><i class="fas fa-minus text-white"></i></button>
        </div>
    </div>
    <div class="d-flex flex-column flex-grow-1 bg-light p-2" style="min-height: 0;">
        <!-- Επιλογή Κτήματος Context -->
        <div class="mb-2">
            <select id="secretaryKtimaSelect" class="form-select form-select-sm border-success shadow-sm">
                <option value="none" selected>Γενική Ερώτηση (Χωρίς Κτήμα)</option>
                {% for ktima in ktimata %}
                    <option value="{{ ktima.id }}">{{ ktima.onoma_ktimatos }}</option>
                {% endfor %}
                <option value="all">Όλα τα Κτήματα (Συγκεντρωτικά)</option>
            </select>
        </div>
        
        <!-- Chat History -->
        <div id="secretaryChatHistory" class="flex-grow-1 p-2 bg-white rounded border shadow-sm mb-2" style="overflow-y: auto; min-height: 0; display: flex; flex-direction: column;">
            <div class="p-2 mb-2 bg-light border border-success rounded text-dark shadow-sm w-85 align-self-start small">
                <strong><i class="fas fa-headset text-success"></i> Γραμματέας:</strong><br>
                Γεια σας! Μπορείτε να μου πείτε "Μόλις ράντισα χαλκό", να με ρωτήσετε για τον καιρό, ή να μου στείλετε φωτογραφία ενός άρρωστου φύλλου για να το δει ο AI Γεωπόνος.
            </div>
        </div>
        
        <!-- Input Area -->
        <form id="secretaryForm" onsubmit="event.preventDefault(); sendToSecretary();" class="mt-auto">
            <div class="input-group shadow-sm">
                <!-- Hidden File Inputs -->
                <input type="file" id="secretaryCameraInput" accept="image/*" capture="environment" class="d-none" onchange="previewSecretaryImages(this)">
                <input type="file" id="secretaryFilesInput" accept="image/*,.pdf" multiple class="d-none" onchange="previewSecretaryImages(this)">
                
                <!-- Dropdown for Attachment -->
                <button type="button" class="btn btn-outline-secondary bg-white dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false" title="Επισύναψη Αρχείου">
                    <i class="fas fa-paperclip text-primary"></i>
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#" onclick="document.getElementById('secretaryCameraInput').click(); event.preventDefault();"><i class="fas fa-camera text-success me-2"></i> Κάμερα (Φωτογραφία)</a></li>
                    <li><a class="dropdown-item" href="#" onclick="document.getElementById('secretaryFilesInput').click(); event.preventDefault();"><i class="fas fa-folder-open text-warning me-2"></i> Επιλογή από Αρχεία (Εικόνες / PDF)</a></li>
                </ul>
                
                <!-- Text Input -->
                <input type="text" id="secretaryTextInput" class="form-control border-success" placeholder="Πληκτρολογήστε ή μιλήστε...">
                
                <!-- Voice Input (Mic) -->
                <button type="button" class="btn btn-outline-danger bg-white" id="secretaryMicBtn" onclick="startSecretaryDictation()" title="Φωνητική Υπαγόρευση">
                    <i class="fas fa-microphone"></i>
                </button>
                
                <!-- Clear History Button -->
                <button type="button" class="btn btn-outline-warning bg-white" onclick="clearSecretaryHistory()" title="Καθαρισμός Μνήμης Συζήτησης">
                    <i class="fas fa-broom"></i>
                </button>
                
                <!-- Submit -->
                <button type="submit" class="btn btn-success" id="secretarySubmitBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div id="secretaryImagePreview" class="mt-1 d-none text-muted small"></div>
        </form>
    </div>
</div>

<!-- Floating Action Button: AI Γραμματέας -->
<button class="btn btn-success rounded-circle shadow-lg" onclick="toggleSecretaryBubble()" title="AI Γραμματέας" 
        style="position: fixed; bottom: 105px; right: 30px; width: 60px; height: 60px; z-index: 1050; display: flex; align-items: center; justify-content: center; border: 2px solid white;">
    <i class="fas fa-headset fa-2x"></i>
</button>

<script>
    // --- AI ΓΡΑΜΜΑΤΕΑΣ: Λειτουργίες UI & Web Speech API ---
    window.toggleSecretaryBubble = function() {
        const bubble = document.getElementById('secretaryBubble');
        if (bubble.classList.contains('d-none')) {
            bubble.classList.remove('d-none');
            bubble.classList.add('d-flex');
            sessionStorage.setItem('secretaryBubbleOpen', 'true');
            if (window.innerWidth <= 768) { document.body.style.overflow = 'hidden'; } // Κλείδωμα φόντου
        } else {
            bubble.classList.add('d-none');
            bubble.classList.remove('d-flex');
            sessionStorage.setItem('secretaryBubbleOpen', 'false');
            document.body.style.overflow = ''; // Ξεκλείδωμα φόντου
        }
    };

    // --- Fullscreen Toggle ---
    window.toggleFullscreenSecretaryBubble = function() {
        const bubble = document.getElementById('secretaryBubble');
        const icon = document.querySelector('#secretaryHeader .fa-expand, #secretaryHeader .fa-compress');
        
        if (bubble.classList.contains('fullscreen-bubble')) {
            bubble.classList.remove('fullscreen-bubble');
            if (icon) {
                icon.classList.remove('fa-compress');
                icon.classList.add('fa-expand');
            }
        } else {
            bubble.classList.add('fullscreen-bubble');
            if (icon) {
                icon.classList.remove('fa-expand');
                icon.classList.add('fa-compress');
            }
        }
    };

    // --- Καθαρισμός Συνομιλίας ---
    window.clearSecretaryHistory = function() {
        if(confirm('Είστε σίγουροι ότι θέλετε να διαγράψετε το ιστορικό της τρέχουσας συζήτησης;')) {
            window.secretaryChatHistoryData = [];
            sessionStorage.removeItem('secretaryChatHistory');
            const historyDiv = document.getElementById('secretaryChatHistory');
            if (historyDiv) {
                historyDiv.innerHTML = `<div class="p-2 mb-2 bg-light border border-success rounded text-dark shadow-sm w-85 align-self-start small">
                    <strong><i class="fas fa-headset text-success"></i> Γραμματέας:</strong><br>
                    Γεια σας! Μπορείτε να μου πείτε "Μόλις ράντισα χαλκό", να με ρωτήσετε για τον καιρό, ή να μου στείλετε φωτογραφία ενός άρρωστου φύλλου για να το δει ο AI Γεωπόνος.
                </div>`;
            }
        }
    };

    // Ασφαλής αποθήκευση ιστορικού
    function saveChatHistory() {
        sessionStorage.setItem('secretaryChatHistory', JSON.stringify(window.secretaryChatHistoryData));
    }

    // --- ΜΝΗΜΗ CHAT & ΕΛΑΧΙΣΤΟΠΟΙΗΣΗ ---
    window.secretaryChatHistoryData = JSON.parse(sessionStorage.getItem('secretaryChatHistory')) || [];

    document.addEventListener('DOMContentLoaded', function() {
        // Επαναφορά του παραθύρου αν ήταν ανοιχτό πριν την ανανέωση της σελίδας
        if (sessionStorage.getItem('secretaryBubbleOpen') === 'true') {
            const bubble = document.getElementById('secretaryBubble');
            if (bubble) {
                bubble.classList.remove('d-none');
                bubble.classList.add('d-flex');
                if (window.innerWidth <= 768) { document.body.style.overflow = 'hidden'; }
            }
        }

        const historyDiv = document.getElementById('secretaryChatHistory');
        if (historyDiv && window.secretaryChatHistoryData.length > 0) {
            window.secretaryChatHistoryData.forEach(msg => {


                if (msg.role === 'user') {
                    historyDiv.innerHTML += `<div class="p-2 mb-2 bg-primary text-white rounded shadow-sm w-85 align-self-end text-end ms-auto small">${msg.content}</div>`;
                } else {
                    historyDiv.innerHTML += `<div class="p-2 mb-2 bg-light text-dark border-success border rounded shadow-sm w-85 align-self-start small mt-2"><strong><i class="fas fa-headset"></i> Γραμματέας:</strong><br>${msg.content}</div>`;
                }
            });
            setTimeout(() => { historyDiv.scrollTop = historyDiv.scrollHeight; }, 100);
        }

        // --- Υπολογισμός Ύψους σε Κινητά (Virtual Keyboard Fix) ---
        if (window.visualViewport) {
            const adjustSecretaryViewport = function() {
                const bubble = document.getElementById('secretaryBubble');
                if (bubble && !bubble.classList.contains('d-none') && window.innerWidth <= 768) {
                    // Το offsetTop ακολουθεί ακριβώς το ορατό κομμάτι χωρίς να σπάει το layout
                    bubble.style.top = window.visualViewport.offsetTop + 'px';
                    bubble.style.height = window.visualViewport.height + 'px';
                    
                    if (historyDiv) historyDiv.scrollTop = historyDiv.scrollHeight;
                } else if (bubble && window.innerWidth > 768 && !bubble.classList.contains('fullscreen-bubble')) {
                    bubble.style.height = '550px'; // Επαναφορά σε PC
                    bubble.style.top = '';
                }
            };
            
            window.visualViewport.addEventListener('resize', adjustSecretaryViewport);
            window.visualViewport.addEventListener('scroll', adjustSecretaryViewport); // Προσθήκη ελέγχου scroll
            
            const secInput = document.getElementById('secretaryTextInput');
            if (secInput) {
                secInput.addEventListener('focus', () => { setTimeout(adjustSecretaryViewport, 50); setTimeout(adjustSecretaryViewport, 300); });
                secInput.addEventListener('blur', () => { setTimeout(adjustSecretaryViewport, 50); });
            }
        }
    });

    let secretaryMediaStream = null;
    let secretaryRecognition = null;
    let isSecretaryRecording = false;
    let secretarySelectedFiles = [];

    function previewSecretaryImages(input) { 
        if(input.files && input.files.length > 0) { 
            for(let i=0; i<input.files.length; i++) {
                secretarySelectedFiles.push(input.files[i]);
            }
            updateSecretaryImagePreview();
        } 
        input.value = ""; // Reset to allow same file selection again
    }
    
    function updateSecretaryImagePreview() {
        const previewDiv = document.getElementById('secretaryImagePreview');
        if (secretarySelectedFiles.length > 0) {
            previewDiv.innerHTML = `<i class="fas fa-file-alt"></i> Επιλέχθηκαν ${secretarySelectedFiles.length} αρχεία <i class="fas fa-times text-danger ms-2" style="cursor:pointer;" onclick="clearSecretaryImages()"></i>`;
            previewDiv.classList.remove('d-none');
        } else {
            previewDiv.classList.add('d-none');
        }
    }

    function clearSecretaryImages() { 
        secretarySelectedFiles = [];
        updateSecretaryImagePreview();
    }

    function startSecretaryDictation() {
        const micBtn = document.getElementById('secretaryMicBtn');
        const inputEl = document.getElementById('secretaryTextInput');
        
        if (isSecretaryRecording && secretaryRecognition) {
            secretaryRecognition.stop();
            return;
        }

        if (window.hasOwnProperty('webkitSpeechRecognition')) {
            secretaryRecognition = new webkitSpeechRecognition();
            secretaryRecognition.continuous = false; 
            secretaryRecognition.interimResults = false; 
            secretaryRecognition.lang = "el-GR";
            
            secretaryRecognition.onstart = function() {
                isSecretaryRecording = true;
                micBtn.classList.remove('btn-outline-danger'); 
                micBtn.classList.add('btn-danger', 'text-white');
                micBtn.innerHTML = '<i class="fas fa-stop-circle fa-beat"></i>'; 
                inputEl.placeholder = "🔴 Ακούω... (Πατήστε για στοπ)";
            };

            secretaryRecognition.onresult = function(e) { inputEl.value = e.results[0][0].transcript; sendToSecretary(); };
            secretaryRecognition.onerror = function(e) { inputEl.placeholder = "Σφάλμα μικροφώνου."; };
            secretaryRecognition.onend = function() { 
                isSecretaryRecording = false;
                micBtn.classList.add('btn-outline-danger'); micBtn.classList.remove('btn-danger', 'text-white'); 
                micBtn.innerHTML = '<i class="fas fa-microphone"></i>'; inputEl.placeholder = "Πληκτρολογήστε ή μιλήστε..."; 
            };
            
            secretaryRecognition.start();
        } else { alert("Ο browser σας δεν υποστηρίζει φωνητική αναγνώριση. Χρησιμοποιήστε Chrome ή Edge."); }
    }

    function sendToSecretary() {
        const inputEl = document.getElementById('secretaryTextInput');
        const ktimaId = document.getElementById('secretaryKtimaSelect').value;
        const historyDiv = document.getElementById('secretaryChatHistory');
        const submitBtn = document.getElementById('secretarySubmitBtn');
        
        const text = inputEl.value.trim();
        const hasImages = secretarySelectedFiles.length > 0;
        if(!text && !hasImages) return;
        

        if (text) {
            window.secretaryChatHistoryData.push({role: 'user', content: text});
            saveChatHistory();
        }
        let msgHtml = `<div class="p-2 mb-2 bg-primary text-white rounded shadow-sm w-85 align-self-end text-end ms-auto small">`;
        if(hasImages) msgHtml += `<i class="fas fa-file-alt mb-1"></i> ${secretarySelectedFiles.length} Αρχεία<br>`;
        if(text) msgHtml += `${text}`;
        msgHtml += `</div>`;
        historyDiv.innerHTML += msgHtml; historyDiv.scrollTop = historyDiv.scrollHeight;
        
        const formData = new FormData();
        formData.append('text', text);
        formData.append('history', JSON.stringify(window.secretaryChatHistoryData));
        
        // Αποτροπή αποστολής της λέξης "none" που κρασάρει την PostgreSQL
        if(ktimaId && ktimaId !== 'none') {
            formData.append('ktima_id', ktimaId);
        }
        
        secretarySelectedFiles.forEach((file) => {
            formData.append('images', file);
        });
        
        inputEl.value = ""; clearSecretaryImages();
        submitBtn.disabled = true; submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        
        fetch('/api/ai_secretary', { method: 'POST', body: formData })
        .then(async res => {
            if (!res.ok) {
                let errStr = "Σφάλμα Διακομιστή";
                try {
                    const errData = await res.json();
                    errStr = errData.error || errStr;
                } catch(e) {
                    if(res.status === 413) errStr = "Το αρχείο εξακολουθεί να είναι πολύ μεγάλο.";
                    else errStr = `Σφάλμα ${res.status}: Αδυναμία επικοινωνίας με το AI.`;
                }
                throw new Error(errStr);
            }
            return res.json();
        })
        .then(data => {
            submitBtn.disabled = false; submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
            if(data.error) { alert("Σφάλμα: " + data.error); return; }
            if(data.reply) {
                window.secretaryChatHistoryData.push({role: 'model', content: data.reply});
                saveChatHistory();
            }
            let bgClass = data.action === 'ADD_TASK' ? 'bg-success text-white' : 'bg-light text-dark border-success';
            let aiHtml = `<div class="p-2 mb-2 ${bgClass} border rounded shadow-sm w-85 align-self-start small mt-2"><strong><i class="fas fa-headset"></i> Γραμματέας:</strong><br>${data.reply}</div>`;
            historyDiv.innerHTML += aiHtml; historyDiv.scrollTop = historyDiv.scrollHeight;
            if(data.action === 'ADD_TASK' || data.action === 'UPDATE_KTIMA' || data.action === 'DELETE_TASKS' || data.action === 'ADD_EXPENSE') {
                setTimeout(() => location.reload(), 2500);
            }
        })
        .catch(err => {
            submitBtn.disabled = false; submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
            alert(err.message || "Σφάλμα επικοινωνίας.");
        });
    }
</script>
